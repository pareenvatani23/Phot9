name: PSHuman on Modal (A100-80GB)

# Builds + runs the PSHuman container on Modal and publishes the resulting
# textured .obj mesh to the ci-pshuman branch. Heavy first build (compiles
# nvdiffrast/pytorch3d, downloads weights) — needs Modal credits + an A100-80GB.
on:
  push:
    branches: [ "claude/diorama-build-spec-h6906m" ]
    paths: [ ".github/workflows/gpu-pshuman.yml", "gpu/pshuman_app.py" ]
  workflow_dispatch:
    inputs:
      modal_token_id:
        description: "Modal token id (ak-...)"
        required: true
      modal_token_secret:
        description: "Modal token secret (as-...)"
        required: true
      image:
        description: "image path in repo"
        required: false
        default: "demo/crops/boat_woman.png"
      seed:
        description: "PSHuman seed (42 or 600)"
        required: false
        default: "600"

permissions:
  contents: write

jobs:
  pshuman:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MODAL_TOKEN_ID: ${{ inputs.modal_token_id }}
      MODAL_TOKEN_SECRET: ${{ inputs.modal_token_secret }}
    steps:
      - uses: actions/checkout@v4

      - name: Mask token
        run: |
          echo "::add-mask::${{ inputs.modal_token_id }}"
          echo "::add-mask::${{ inputs.modal_token_secret }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal client
        run: pip install -r gpu/requirements.txt

      - name: Build + run PSHuman
        run: |
          modal run gpu/pshuman_app.py::run_demo \
            --image "${{ inputs.image }}" \
            --seed "${{ inputs.seed }}"
          ls -la out || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pshuman-mesh
          path: out/
          if-no-files-found: warn

      - name: Publish to ci-pshuman
        run: |
          test -d out && [ -n "$(ls -A out 2>/dev/null)" ] || { echo "no outputs"; exit 0; }
          git config user.name "ci"; git config user.email "ci@local"
          git checkout --orphan ci-pshuman
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f out
          git commit -q -m "PSHuman mesh $(date -u +%FT%TZ)"
          git push -f origin ci-pshuman
