name: HunyuanWorld on Modal (A100-80GB)

# Builds + runs HunyuanWorld-1.0 on Modal: single image -> layered mesh world
# (mesh_layer*.ply), published to the ci-world branch. Heavy first build
# (pytorch3d, ZIM, Real-ESRGAN). Needs Modal credits + HF_TOKEN secret (the
# tencent/HunyuanWorld-1 weights may require accepting the license on HF).
on:
  push:
    branches: [ "claude/diorama-build-spec-h6906m" ]
    paths: [ ".github/workflows/gpu-hunyuanworld.yml", "gpu/hunyuanworld_app.py" ]
  workflow_dispatch:
    inputs:
      modal_token_id:
        description: "Modal token id (ak-...)"
        required: true
      modal_token_secret:
        description: "Modal token secret (as-...)"
        required: true
      image:
        description: "image path in repo"
        required: false
        default: "demo/hiker.jpg"
      classes:
        description: "scene class (outdoor | indoor)"
        required: false
        default: "outdoor"

permissions:
  contents: write

jobs:
  hunyuanworld:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MODAL_TOKEN_ID: ${{ inputs.modal_token_id }}
      MODAL_TOKEN_SECRET: ${{ inputs.modal_token_secret }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Mask token
        run: |
          echo "::add-mask::${{ inputs.modal_token_id }}"
          echo "::add-mask::${{ inputs.modal_token_secret }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Modal client
        run: pip install -r gpu/requirements.txt
      - name: Build + run HunyuanWorld
        run: |
          modal run gpu/hunyuanworld_app.py::run_demo \
            --image "${{ inputs.image }}" --classes "${{ inputs.classes }}"
          ls -la out || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hunyuanworld-mesh
          path: out/
          if-no-files-found: warn
      - name: Publish to ci-world
        run: |
          test -d out && [ -n "$(ls -A out 2>/dev/null)" ] || { echo "no outputs"; exit 0; }
          git config user.name "ci"; git config user.email "ci@local"
          git checkout --orphan ci-world
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f out
          git commit -q -m "HunyuanWorld $(date -u +%FT%TZ)"
          git push -f origin ci-world
