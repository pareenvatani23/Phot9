name: Real Diorama (fal pipeline + orbit video)

# Runs the FULL pipeline on a runner that can reach fal: processes demo/input.jpg
# through fal-ai/sam-3, then loads the resulting multi-person GLB + backdrop into
# the iOS Simulator and records the bounded-orbit video.
#
# Trigger manually (workflow_dispatch) and pass the fal key as input. The key is
# masked in logs and never committed.
on:
  # Push only registers the workflow so it becomes dispatchable on this branch;
  # the job below is gated to manual dispatch (which carries the key) only.
  push:
    branches: [ "claude/diorama-build-spec-h6906m" ]
    paths: [ ".github/workflows/real-diorama.yml" ]
  workflow_dispatch:
    inputs:
      fal_key:
        description: "fal API key (id:secret)"
        required: true

permissions:
  contents: write

jobs:
  diorama:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 40
    env:
      FAL_KEY: ${{ inputs.fal_key }}
    steps:
      - uses: actions/checkout@v4

      - name: Mask key
        run: echo "::add-mask::${{ inputs.fal_key }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fal pipeline on demo/input.jpg
        working-directory: backend
        run: |
          npm ci
          npm run build
          node dist/cli.js ../demo/input.jpg ../demo/real
          echo "--- produced ---"
          ls -la ../demo/real

      - name: Serve produced assets locally
        run: |
          nohup python3 -m http.server 8765 --directory demo/real >/tmp/http.log 2>&1 &
          sleep 1
          curl -sI http://localhost:8765/hero.glb | head -1 || true
          curl -sI http://localhost:8765/backdrop.jpg | head -1 || true

      - name: Install XcodeGen & generate project
        working-directory: ios
        run: brew install xcodegen && xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[][] | select(.name|test("iPhone"))] | .[0].udid')
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build for Simulator
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild -project Diorama.xcodeproj -scheme Diorama -configuration Debug \
            -destination "id=${{ steps.sim.outputs.udid }}" -derivedDataPath build \
            -quiet CODE_SIGNING_ALLOWED=NO build 2>&1 | tee ../real-build.log

      - name: Launch real diorama & record video
        working-directory: ios
        run: |
          set +e
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          APP=$(find build/Build/Products -name "Diorama.app" -type d | head -1)
          xcrun simctl install "$UDID" "$APP"

          # Point demo mode at the real reconstructed assets served locally.
          xcrun simctl launch "$UDID" com.phot9.diorama -DioramaDemo 1 \
            -DioramaDemoGLB http://localhost:8765/hero.glb \
            -DioramaDemoBackdrop http://localhost:8765/backdrop.jpg

          sleep 16   # download assets + build scene + start orbit
          xcrun simctl io "$UDID" recordVideo --codec=h264 --force ../demo/real-orbit.mp4 &
          REC=$!
          sleep 12
          # Stop recording: SIGINT must reach the ACTUAL recorder (signalling the
          # xcrun wrapper doesn't propagate). Then WAIT for the recorder process to
          # exit, which is when simctl finalizes the mp4. NEVER SIGKILL — kill -9
          # makes simctl DELETE its output file.
          kill -INT "$REC" 2>/dev/null || true
          pkill -INT -f "simctl.*recordVideo" 2>/dev/null || true
          for i in $(seq 1 180); do
            pgrep -f "simctl.*recordVideo" >/dev/null 2>&1 || { echo "recorder exited after ${i}s"; break; }
            sleep 1
          done
          sleep 2  # filesystem flush
          xcrun simctl io "$UDID" screenshot ../demo/real-screenshot.png
          ls -la ../demo/real-orbit.mp4 ../demo/real-screenshot.png
          # Fail loudly if the mp4 has no moov atom, so we never publish a broken video.
          if ! python3 -c "import sys;b=open('../demo/real-orbit.mp4','rb').read();ok=b'moov' in b;print('HAS_MOOV',ok,'size',len(b));sys.exit(0 if ok else 1)"; then
            echo "ERROR: recorded video has no moov atom (truncated)"; exit 1
          fi

      - name: Publish results to ci-media branch
        if: success()
        run: |
          [ -f demo/real-orbit.mp4 ] || [ -f demo/real-screenshot.png ] || { echo "no media"; exit 0; }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Force-push the media to a DEDICATED orphan branch — never conflicts,
          # never races with other workflows pushing the feature branch.
          git checkout --orphan ci-media
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f demo/real-orbit.mp4 demo/real-screenshot.png \
            demo/real/meta.json demo/real/hero.glb demo/real/backdrop.jpg \
            demo/real/depth.png demo/real/scene.splat 2>/dev/null || true
          git commit -m "CI media $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do
            git push -f origin ci-media && { echo "pushed ci-media"; break; }
            echo "push retry $i"; sleep 4
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-diorama
          path: |
            demo/real-orbit.mp4
            demo/real-screenshot.png
            demo/real/meta.json
            real-build.log
          if-no-files-found: warn
