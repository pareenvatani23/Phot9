name: Marble world generation

# Generates a World Labs Marble world from a photo: uploads the image to fal
# storage for a public URL, calls Marble, logs + publishes the resulting SPZ
# splat URL to the ci-marble branch.
#
# Keys are read from repo secrets (FAL_KEY, WORLDLABS_API_KEY). Choose the image
# and model at dispatch. marble-1.1 = full quality (~$1.20 of World Labs credit);
# marble-1.0-draft = cheap preview (~$0.12). NOTE: this spends World Labs/fal
# credit, which is separate from the Modal GPU budget.
on:
  push:
    branches: [ "claude/diorama-build-spec-h6906m" ]
    paths: [ ".github/workflows/marble.yml" ]
  workflow_dispatch:
    inputs:
      image:
        description: "image path in repo (e.g. demo/hiker.jpg)"
        required: false
        default: "demo/input.jpg"
      model:
        description: "Marble model (marble-1.1 full | marble-1.0-draft cheap)"
        required: false
        default: "marble-1.1"

permissions:
  contents: write

jobs:
  marble:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FAL_KEY: ${{ secrets.FAL_KEY }}
      WORLDLABS_API_KEY: ${{ secrets.WORLDLABS_API_KEY }}
      MARBLE_MODEL: ${{ inputs.model }}
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets present
        run: |
          test -n "$FAL_KEY" || { echo "::error::FAL_KEY secret not set"; exit 1; }
          test -n "$WORLDLABS_API_KEY" || { echo "::error::WORLDLABS_API_KEY secret not set"; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Marble world
        working-directory: backend
        run: |
          npm ci
          npm run build
          node dist/marbleRun.js "../${{ inputs.image }}" ../demo/marble
          echo "--- marble.json ---"
          cat ../demo/marble/marble.json

      - name: Publish marble.json to ci-marble
        if: always()
        run: |
          git config user.name "ci"; git config user.email "ci@local"
          test -f demo/marble/marble.json || exit 0
          git checkout --orphan ci-marble
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f demo/marble/marble.json web/index.html
          git commit -q -m "Marble world $(date -u +%FT%TZ)"
          git push -f origin ci-marble
