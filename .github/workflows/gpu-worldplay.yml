name: WorldPlay on Modal (A100-80GB)

# Builds + runs HY-WorldPlay (HY-World 1.5) on Modal: single image -> interactive
# camera-path video (worldplay.mp4), published to the ci-worldplay branch. Uses
# the distilled autoregressive model (4 steps, sp=1 -> 72 GB, one A100-80GB).
# Light build (torch 2.6/cu124 + pinned wheels). Needs Modal credits + an HF_TOKEN
# with accepted access to the gated black-forest-labs/FLUX.1-Redux-dev vision encoder.
on:
  push:
    branches: [ "claude/diorama-build-spec-h6906m" ]
    paths: [ ".github/workflows/gpu-worldplay.yml", "gpu/worldplay_app.py" ]
  workflow_dispatch:
    inputs:
      modal_token_id:
        description: "Modal token id (ak-...). Leave blank to use the MODAL_TOKEN_ID repo secret."
        required: false
      modal_token_secret:
        description: "Modal token secret (as-...). Leave blank to use the MODAL_TOKEN_SECRET repo secret."
        required: false
      image:
        description: "input image path in repo"
        required: false
        default: "demo/hiker.jpg"
      prompt:
        description: "scene prompt (guides the I2V generation)"
        required: false
        default: "Cinematic camera moving smoothly through the scene, photorealistic, natural lighting."
      pose:
        description: "camera trajectory: 'orbit360' (full 360 fly-around), a pose string ('w-31'), or a .json path"
        required: false
        default: "w-31"
      video_length:
        description: "frames (must satisfy (n-1)%4==0 and AR ((n-1)//4+1)%4==0; e.g. 125, 189, 253)"
        required: false
        default: "125"

permissions:
  contents: write

jobs:
  worldplay:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MODAL_TOKEN_ID: ${{ inputs.modal_token_id || secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ inputs.modal_token_secret || secrets.MODAL_TOKEN_SECRET }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Mask token
        run: |
          echo "::add-mask::${{ inputs.modal_token_id || secrets.MODAL_TOKEN_ID }}"
          echo "::add-mask::${{ inputs.modal_token_secret || secrets.MODAL_TOKEN_SECRET }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Modal client
        run: pip install -r gpu/requirements.txt
      - name: Build + run WorldPlay
        run: |
          modal run gpu/worldplay_app.py::run_demo \
            --image "${{ inputs.image }}" \
            --prompt "${{ inputs.prompt }}" \
            --pose "${{ inputs.pose }}" \
            --video-length "${{ inputs.video_length }}"
          ls -la out || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: worldplay-video
          path: out/
          if-no-files-found: warn
      - name: Publish clip to ci-worldplay
        continue-on-error: true
        run: |
          test -f out/worldplay.mp4 || { echo "no mp4 to publish"; exit 0; }
          git config user.name "ci"; git config user.email "ci@local"
          git checkout --orphan ci-worldplay
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f out/worldplay.mp4 web/play.html
          git commit -q -m "WorldPlay clip $(date -u +%FT%TZ)"
          git push -f origin ci-worldplay
