name: Build hybrid scene

# Builds the hybrid diorama from demo/input.jpg: people cut out as billboards +
# a clean Marble world with the people erased, emitting a scene.json the viewer
# renders via ?scene=<url>. Dispatch with the fal + World Labs keys (masked).
on:
  push:
    branches: [ "claude/diorama-build-spec-h6906m" ]
    paths: [ ".github/workflows/scene.yml" ]
  workflow_dispatch:
    inputs:
      fal_key:
        description: "fal API key (id:secret)"
        required: true
      worldlabs_key:
        description: "World Labs API key (WLT-Api-Key)"
        required: true
      model:
        description: "Marble model"
        required: false
        default: "marble-1.1"

permissions:
  contents: write

jobs:
  scene:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FAL_KEY: ${{ inputs.fal_key }}
      WORLDLABS_API_KEY: ${{ inputs.worldlabs_key }}
      MARBLE_MODEL: ${{ inputs.model }}
    steps:
      - uses: actions/checkout@v4

      - name: Mask keys
        run: |
          echo "::add-mask::${{ inputs.fal_key }}"
          echo "::add-mask::${{ inputs.worldlabs_key }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build hybrid scene
        working-directory: backend
        run: |
          npm ci
          npm run build
          node dist/sceneRun.js ../demo/input.jpg ../demo/scene
          echo "--- scene.local.json ---"
          cat ../demo/scene/scene.local.json

      - name: Publish scene.local.json to ci-scene
        if: always()
        run: |
          git config user.name "ci"; git config user.email "ci@local"
          test -f demo/scene/scene.local.json || exit 0
          git checkout --orphan ci-scene
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f demo/scene/scene.local.json
          git commit -q -m "Hybrid scene $(date -u +%FT%TZ)"
          git push -f origin ci-scene
