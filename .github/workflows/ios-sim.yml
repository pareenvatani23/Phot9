name: iOS Simulator Build

# Builds the Diorama app on a free GitHub-hosted macOS runner, launches it in
# the iOS Simulator, and uploads a screenshot + build log as artifacts.
on:
  push:
    branches: [ "claude/diorama-build-spec-h6906m" ]
    paths: [ "ios/**", ".github/workflows/ios-sim.yml" ]
  workflow_dispatch:

permissions:
  contents: write   # to publish the recorded demo media back to the branch

jobs:
  build:
    # macos-15 ships Xcode 16, which reads XcodeGen's objectVersion-77 project
    # format. (macos-14's Xcode 15.4 cannot open it.)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Tooling versions
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep -i ios || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[][] | select(.name|test("iPhone"))] | .[0].udid')
          NAME=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[][] | select(.name|test("iPhone"))] | .[0].name')
          echo "Using simulator: $NAME ($UDID)"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build for Simulator
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project Diorama.xcodeproj \
            -scheme Diorama \
            -configuration Debug \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee ../ios-build.log

      - name: Check sample asset reachability
        if: success()
        run: |
          for u in \
            "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CesiumMan/glTF-Binary/CesiumMan.glb" \
            "https://picsum.photos/seed/diorama/1200/1600"; do
            echo "HEAD $u"; curl -sIL -o /dev/null -w "  -> %{http_code}\n" "$u" || true
          done

      - name: Boot, install, launch demo, record video
        if: success()
        working-directory: ios
        run: |
          set +e   # never let a transient simctl error or signal hang the step
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          APP=$(find build/Build/Products -name "Diorama.app" -type d | head -1)
          echo "App bundle: $APP"
          xcrun simctl install "$UDID" "$APP"

          # Launch straight into the auto-orbit demo (real GLB + real photo).
          xcrun simctl launch "$UDID" com.phot9.diorama -DioramaDemo 1

          # Allow time to download sample assets, build the scene, and start
          # orbiting before recording.
          sleep 14

          # Record ~12 s of the live auto-orbit. Stop with SIGINT (which finalizes
          # the mp4), bounded by a kill loop so the step can never block.
          xcrun simctl io "$UDID" recordVideo --codec=h264 --force ../ios-orbit.mp4 &
          REC=$!
          sleep 12
          kill -INT "$REC" 2>/dev/null
          for i in $(seq 1 15); do kill -0 "$REC" 2>/dev/null || break; sleep 1; done
          kill -9 "$REC" 2>/dev/null

          xcrun simctl io "$UDID" screenshot ../ios-screenshot.png
          ls -la ../ios-orbit.mp4 ../ios-screenshot.png
          true

      - name: Publish demo media to branch
        if: always()
        run: |
          set -e
          [ -f ios-orbit.mp4 ] || [ -f ios-screenshot.png ] || { echo "no media"; exit 0; }
          mkdir -p demo
          cp -f ios-orbit.mp4 demo/ 2>/dev/null || true
          cp -f ios-screenshot.png demo/ 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f demo/ios-orbit.mp4 demo/ios-screenshot.png 2>/dev/null || true
          git commit -m "CI: publish demo orbit video + screenshot" || { echo "nothing to commit"; exit 0; }
          git push origin HEAD:claude/diorama-build-spec-h6906m

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator
          path: |
            ios-orbit.mp4
            ios-screenshot.png
            ios-build.log
          if-no-files-found: warn
