name: Deploy Spark viewer to Pages

# Publishes web/ (the Spark Gaussian-splat viewer) to GitHub Pages so a generated
# Marble world can be viewed in any browser via ?world=<spz-url>.
on:
  push:
    branches: [ "main" ]
    paths: [ "web/**", ".github/workflows/pages.yml" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
